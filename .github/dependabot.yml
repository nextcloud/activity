version: 2
updates:
- package-ecosystem: "composer"
  directory: "/"
  schedule:
    interval: weekly
    day: saturday
    time: "03:00"
    timezone: Europe/Paris
  cooldown:
    default-days: 4
  open-pull-requests-limit: 10
  labels:
    - 3. to review
    - dependencies
  groups:
    prod:
      dependency-type: "production"
      update-types:
        - "minor"
        - "patch"
    dev:
      dependency-type: "development"
      update-types:
        - "minor"
        - "patch"
- package-ecosystem: "composer"
  directories:
    - "/vendor-bin/cs-fixer"
    - "/vendor-bin/phpunit"
    - "/vendor-bin/psalm"
  schedule:
    interval: weekly
    day: saturday
    time: "03:00"
    timezone: Europe/Paris
  cooldown:
    default-days: 4
  open-pull-requests-limit: 10
  labels:
    - 3. to review
    - dependencies
